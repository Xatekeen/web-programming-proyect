<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sejong International Student Helper</title>
<link rel="icon" type="image/png" href="../assets/s_sejong.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="back-bar">
    <a href="../index.html">&larr; Sejong University</a>
  </div>
  <header class="app-header">
    <div class="brand">
      <img src="../assets/s_sejong.png" alt="Sejong University" class="brand-logo" width="40" height="40">
      <span class="brand-icon">🧭</span>
      <div>
        <h1>Sejong Helper</h1>
        <p id="brandTagline">International Student Guide · Gwangjin-gu, Seoul</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="search-wrap">
        <input type="search" id="searchInput" placeholder="Search restaurants, clubs, services...">
      </div>
      <button id="darkToggle" class="icon-btn" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
    </div>
  </header>

  <nav class="tabs" role="tablist" aria-label="Categories">
    <button class="tab is-active" data-tab="restaurants" role="tab" aria-selected="true">🍜 Restaurants</button>
    <button class="tab" data-tab="clubs" role="tab" aria-selected="false">🎉 Clubs</button>
    <button class="tab" data-tab="services" role="tab" aria-selected="false">🏥 Services</button>
    <button class="tab" data-tab="favorites" role="tab" aria-selected="false">⭐ Favorites</button>
    <button class="tab" data-tab="guides" role="tab" aria-selected="false">📚 Guides</button>
    <button class="tab" data-tab="reviews" role="tab" aria-selected="false">📝 Reviews</button>
    <button class="tab" data-tab="budget" role="tab" aria-selected="false">💰 Budget</button>
    <button class="tab" data-tab="compare" role="tab" aria-selected="false">🔄 Compare</button>
    <button class="tab" data-tab="dashboard" role="tab" aria-selected="false">📊 Dashboard</button>
    <button class="tab" data-tab="collections" role="tab" aria-selected="false">📌 Collections</button>
    <button class="tab" data-tab="settings" role="tab" aria-selected="false">⚙️ Settings</button>
    <button class="map-toggle-btn" id="mapToggle" type="button">🗺️ Map</button>
  </nav>

  <main class="layout">
    <section class="map-pane" id="mapPane">
      <div id="map"></div>
    </section>

    <section class="content-pane">
      <aside class="filters" id="filters">
        <h2 id="filtersTitle">Filters</h2>

        <div class="filter-group" data-applies="restaurants">
          <label id="budgetMaxLabel">Budget (max ₩)
            <input type="range" id="budgetSlider" min="1" max="4" step="1" value="4">
            <span id="budgetLabel">Any</span>
          </label>

          <fieldset>
            <legend id="cuisineLegend">Cuisine</legend>
            <div class="checkbox-grid" id="cuisineFilters"></div>
          </fieldset>

          <fieldset>
            <legend id="dietaryLegend">Dietary</legend>
            <div class="checkbox-grid" id="dietaryFilters"></div>
          </fieldset>
        </div>

        <label class="open-now-toggle">
          <input type="checkbox" id="openNowToggle"> <span id="openNowLabel">⏰ Open now only</span>
        </label>
        <label class="sort-select"><span id="timeOfDayLabel">Time of day</span>
          <select id="timeOfDaySelect">
            <option value="" id="optAnyTime">Any time</option>
            <option value="past-midnight" id="optPastMidnight">Past midnight (00:00-05:00)</option>
            <option value="early-morning" id="optEarlyMorning">Early morning (06:00-10:00)</option>
            <option value="lunch" id="optLunch">Lunch hours (11:00-14:00)</option>
          </select>
        </label>

        <label class="distance-filter"><span id="maxDistanceLabel">Max distance</span>: <span id="distanceLabel">2 km</span>
          <input type="range" id="distanceSlider" min="100" max="2000" step="100" value="2000">
        </label>

        <label class="sort-select"><span id="sortByLabel">Sort by</span>
          <select id="sortSelect">
            <option value="distance" id="optSortDistance">Distance</option>
            <option value="rating" id="optSortRating">Rating</option>
            <option value="price" id="optSortPrice">Price (low to high)</option>
            <option value="closing" id="optSortClosing">Closing soon</option>
          </select>
        </label>

        <button id="resetFilters" class="text-btn">Reset filters</button>
      </aside>

      <div class="cards-area">
        <div class="guide-search-row" id="guideSearchRow" style="display:none;">
          <input type="search" id="guideSearchInput" class="guide-search" placeholder="Search this section...">
        </div>
        <p class="results-count" id="resultsCount"></p>
        <div class="cards-grid" id="cardsGrid"></div>
        <div id="featurePanel" class="feature-panel" style="display:none;"></div>
      </div>
    </section>
  </main>

  <button class="chat-fab" id="chatFab" aria-label="Open AI assistant" title="Ask the Sejong Helper assistant">💬</button>
  <div class="chat-panel" id="chatPanel" aria-hidden="true">
    <div class="chat-header">
      <strong id="chatTitle">Sejong Helper Assistant</strong>
      <button class="modal-close" id="chatClose" aria-label="Close chat">×</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg bot" id="chatGreeting">Hi! Ask me about restaurants, clubs, or services near campus — e.g. "vegan food near campus" or "halal restaurants under ₩₩".</div>
    </div>
    <form class="chat-input-row" id="chatForm">
      <input type="text" id="chatInput" placeholder="Ask a question..." autocomplete="off">
      <button type="submit" id="chatSendBtn">Send</button>
    </form>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="detailModal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="Close">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data/restaurants.js"></script>
  <script src="data/clubs.js"></script>
  <script src="data/services.js"></script>
  <script src="data/guides.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/filter-engine.js"></script>
  <script src="js/tag-labels-data.js"></script>
  <script src="js/features.js"></script>
  <script src="js/map-handler.js"></script>
  <script src="js/ui-manager.js"></script>
  <script src="js/ai-assistant.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
